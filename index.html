<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean, modern, and responsive calculator web application supporting basic arithmetic operations with multiple themes.">
    <title>Modern Premium Calculator</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link to custom styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Floating Theme Selector Sidebar -->
        <aside class="theme-panel" id="theme-panel">
            <h2 class="theme-panel-title">THEMES</h2>
            <div class="theme-options">
                <!-- Theme 1 Button -->
                <button class="theme-btn active" data-theme-select="classic" aria-label="Switch to Classic Theme">
                    <span class="theme-color-preview preview-classic"></span>
                    Classic
                </button>
                <!-- Theme 2 Button -->
                <button class="theme-btn" data-theme-select="star-wars" aria-label="Switch to Star Wars Theme">
                    <span class="theme-color-preview preview-star-wars"></span>
                    Star Wars
                </button>
            </div>
        </aside>

        <!-- Main Calculator Body Container -->
        <main class="calculator-container">
            <div class="calculator" id="calculator">
                <!-- Screen Display Area -->
                <div class="display">
                    <!-- Displays the formula/previous operand -->
                    <div class="previous-operand" id="previous-operand"></div>
                    <!-- Displays current input or result -->
                    <div class="current-operand" id="current-operand">0</div>
                </div>

                <!-- Buttons Grid -->
                <div class="buttons-grid">
                    <!-- Clear and Delete operations -->
                    <button class="btn btn-clear span-two" id="btn-clear" data-action="clear">AC</button>
                    <button class="btn btn-delete" id="btn-delete" data-action="delete">DEL</button>
                    <button class="btn btn-operator" id="btn-divide" data-operator="/">&divide;</button>

                    <!-- Row 1: Numbers and Operators -->
                    <button class="btn btn-number" data-number="7">7</button>
                    <button class="btn btn-number" data-number="8">8</button>
                    <button class="btn btn-number" data-number="9">9</button>
                    <button class="btn btn-operator" id="btn-multiply" data-operator="*">&times;</button>

                    <!-- Row 2: Numbers and Operators -->
                    <button class="btn btn-number" data-number="4">4</button>
                    <button class="btn btn-number" data-number="5">5</button>
                    <button class="btn btn-number" data-number="6">6</button>
                    <button class="btn btn-operator" id="btn-subtract" data-operator="-">&minus;</button>

                    <!-- Row 3: Numbers and Operators -->
                    <button class="btn btn-number" data-number="1">1</button>
                    <button class="btn btn-number" data-number="2">2</button>
                    <button class="btn btn-number" data-number="3">3</button>
                    <button class="btn btn-operator" id="btn-add" data-operator="+">&plus;</button>

                    <!-- Row 4: Decimal, Zero, and Equals -->
                    <button class="btn btn-number" data-number="0">0</button>
                    <button class="btn btn-number" data-number=".">.</button>
                    <button class="btn btn-equals span-two" id="btn-equals" data-action="equals">&equals;</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Link to calculator logic -->
    <script src="script.js"></script>
</body>
</html>
